# Secrets que necesita el chart spainsmp en el namespace 'spainsmp'.
# NO subir los reales a git. Aplicar a mano:
#
#   kubectl create namespace spainsmp
#   kubectl apply -f spainsmp-secrets.yaml          # (copia de este .example, sin .example)
#
# Alternativa GitOps segura: usar Sealed Secrets / SOPS y sí versionar el cifrado.
---
# 1) DATABASE_URL (réplica de lectura, 194.26.100.218) — clave 'database-url'.
apiVersion: v1
kind: Secret
metadata:
  name: spainsmp-api-db
  namespace: spainsmp
type: Opaque
stringData:
  database-url: "spainsmp_api:PASSWORD@tcp(194.26.100.218:3306)/spainsmp?parseTime=true"
---
# 2) Resto de env (inyectado como envFrom en api + web). Las claves son nombres de
#    variable de entorno válidos.
#    - DATABASE_PRIMARY_URL → primario de escritura (108.165.47.232), OAuth/account_links.
#    - DISCORD_*            → credenciales de la app de Discord (OAuth de vinculación).
apiVersion: v1
kind: Secret
metadata:
  name: spainsmp-app-secrets
  namespace: spainsmp
type: Opaque
stringData:
  DATABASE_PRIMARY_URL: "spainsmp_api:PASSWORD@tcp(108.165.47.232:3306)/spainsmp_accounts?parseTime=true"
  DISCORD_CLIENT_ID: "1512958734295371936"
  DISCORD_CLIENT_SECRET: "REEMPLAZA_CON_EL_SECRET_DE_DISCORD"
  DISCORD_GUILD_ID: "1512758371189653524"
---
# 3) imagePullSecret para las imágenes privadas de GHCR (ghcr.io/spainsmp/*).
#    Genera el valor con:
#      kubectl create secret docker-registry ghcr \
#        --namespace spainsmp \
#        --docker-server=ghcr.io \
#        --docker-username=<usuario-github> \
#        --docker-password=<GHCR_PAT_read:packages> \
#        --dry-run=client -o yaml
#    y pega el resultado aquí (o aplica ese comando directamente).
