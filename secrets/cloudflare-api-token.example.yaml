# Token de API de Cloudflare para external-dns.
# Crea un token en Cloudflare con permisos: Zone:Read + DNS:Edit sobre las zonas
# oxa.gg y spainsmp.com. NO lo subas a git; aplícalo a mano:
#
#   kubectl create namespace external-dns
#   kubectl apply -f cloudflare-api-token.yaml      # (copia de este .example, sin .example)
#
apiVersion: v1
kind: Secret
metadata:
  name: cloudflare-api-token
  namespace: external-dns
type: Opaque
stringData:
  apiKey: "REEMPLAZA_CON_TU_CLOUDFLARE_API_TOKEN"
