# Token de API de Cloudflare. Lo usan external-dns Y cert-manager (DNS-01).
# Crea un token en Cloudflare con permisos: Zone:Read + DNS:Edit sobre las zonas
# oxa.gg y spainsmp.com. NO lo subas a git; aplícalo en LOS DOS namespaces:
#
#   kubectl create namespace external-dns
#   kubectl create namespace cert-manager
#   # copia este .example a cloudflare-api-token.yaml, pon el token, y:
#   kubectl apply -f cloudflare-api-token.yaml
#
# (el manifiesto define el mismo Secret en ambos namespaces)
---
apiVersion: v1
kind: Secret
metadata:
  name: cloudflare-api-token
  namespace: external-dns
type: Opaque
stringData:
  apiKey: "REEMPLAZA_CON_TU_CLOUDFLARE_API_TOKEN"
---
apiVersion: v1
kind: Secret
metadata:
  name: cloudflare-api-token
  namespace: cert-manager
type: Opaque
stringData:
  apiKey: "REEMPLAZA_CON_TU_CLOUDFLARE_API_TOKEN"
